<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="40%" style="stop-color:#0f2444"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6D00"/>
      <stop offset="100%" style="stop-color:#FF9100"/>
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="glow1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#1565C0; stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a1628; stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#FF6D00; stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0a1628; stop-opacity:0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1565C0" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <!-- Soil layer pattern -->
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1" fill="#FF6D00" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow1)"/>
  <rect width="1280" height="400" fill="url(#glow2)"/>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accentGrad)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="397" width="1280" height="3" fill="url(#accentGrad)"/>

  <!-- === LEFT SIDE: Soil Layers Graphic === -->
  <!-- Borehole / soil column -->
  <g transform="translate(60, 80)" opacity="0.6">
    <!-- Soil column outline -->
    <rect x="0" y="0" width="50" height="240" rx="4" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.5"/>
    <!-- Layer 1: Topsoil -->
    <rect x="2" y="2" width="46" height="50" rx="3" fill="#5D4037" opacity="0.6"/>
    <text x="25" y="30" font-family="monospace" font-size="7" fill="#A1887F" text-anchor="middle">FILL</text>
    <!-- Layer 2: Clay -->
    <rect x="2" y="54" width="46" height="55" fill="#37474F" opacity="0.6"/>
    <text x="25" y="85" font-family="monospace" font-size="7" fill="#78909C" text-anchor="middle">CLAY</text>
    <!-- Layer 3: Sand -->
    <rect x="2" y="111" width="46" height="55" fill="url(#dots)" opacity="0.8"/>
    <rect x="2" y="111" width="46" height="55" fill="#4E342E" opacity="0.3"/>
    <text x="25" y="142" font-family="monospace" font-size="7" fill="#A1887F" text-anchor="middle">SAND</text>
    <!-- Layer 4: Rock -->
    <rect x="2" y="168" width="46" height="70" rx="0" fill="#263238" opacity="0.6"/>
    <text x="25" y="207" font-family="monospace" font-size="7" fill="#546E7A" text-anchor="middle">ROCK</text>
    <!-- SPT N-values -->
    <text x="62" y="30" font-family="monospace" font-size="8" fill="#FF6D00" opacity="0.7">N=5</text>
    <text x="62" y="85" font-family="monospace" font-size="8" fill="#FF6D00" opacity="0.7">N=12</text>
    <text x="62" y="142" font-family="monospace" font-size="8" fill="#FF6D00" opacity="0.7">N=28</text>
    <text x="62" y="207" font-family="monospace" font-size="8" fill="#FF6D00" opacity="0.7">N=50+</text>
    <!-- Depth markers -->
    <text x="-8" y="30" font-family="monospace" font-size="7" fill="#4FC3F7" text-anchor="end" opacity="0.5">2m</text>
    <text x="-8" y="85" font-family="monospace" font-size="7" fill="#4FC3F7" text-anchor="end" opacity="0.5">5m</text>
    <text x="-8" y="142" font-family="monospace" font-size="7" fill="#4FC3F7" text-anchor="end" opacity="0.5">9m</text>
    <text x="-8" y="207" font-family="monospace" font-size="7" fill="#4FC3F7" text-anchor="end" opacity="0.5">15m</text>
  </g>

  <!-- === RIGHT SIDE: Neural Network Graphic === -->
  <g transform="translate(1050, 60)" opacity="0.5">
    <!-- Input layer -->
    <circle cx="0" cy="30" r="8" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="0" cy="70" r="8" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="0" cy="110" r="8" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="0" cy="150" r="8" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <circle cx="0" cy="190" r="8" fill="none" stroke="#4FC3F7" stroke-width="1.5"/>
    <!-- Hidden layer 1 -->
    <circle cx="70" cy="50" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <circle cx="70" cy="100" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <circle cx="70" cy="150" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <circle cx="70" cy="200" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <!-- Hidden layer 2 -->
    <circle cx="140" cy="70" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <circle cx="140" cy="120" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <circle cx="140" cy="170" r="8" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
    <!-- Output layer -->
    <circle cx="200" cy="100" r="10" fill="none" stroke="#00E676" stroke-width="2"/>
    <circle cx="200" cy="160" r="10" fill="none" stroke="#00E676" stroke-width="2"/>
    <!-- Connections: Input to Hidden 1 -->
    <g stroke="#4FC3F7" stroke-width="0.5" opacity="0.3">
      <line x1="8" y1="30" x2="62" y2="50"/><line x1="8" y1="30" x2="62" y2="100"/>
      <line x1="8" y1="70" x2="62" y2="50"/><line x1="8" y1="70" x2="62" y2="100"/><line x1="8" y1="70" x2="62" y2="150"/>
      <line x1="8" y1="110" x2="62" y2="50"/><line x1="8" y1="110" x2="62" y2="100"/><line x1="8" y1="110" x2="62" y2="150"/><line x1="8" y1="110" x2="62" y2="200"/>
      <line x1="8" y1="150" x2="62" y2="100"/><line x1="8" y1="150" x2="62" y2="150"/><line x1="8" y1="150" x2="62" y2="200"/>
      <line x1="8" y1="190" x2="62" y2="150"/><line x1="8" y1="190" x2="62" y2="200"/>
    </g>
    <!-- Connections: Hidden 1 to Hidden 2 -->
    <g stroke="#FF6D00" stroke-width="0.5" opacity="0.3">
      <line x1="78" y1="50" x2="132" y2="70"/><line x1="78" y1="50" x2="132" y2="120"/>
      <line x1="78" y1="100" x2="132" y2="70"/><line x1="78" y1="100" x2="132" y2="120"/><line x1="78" y1="100" x2="132" y2="170"/>
      <line x1="78" y1="150" x2="132" y2="70"/><line x1="78" y1="150" x2="132" y2="120"/><line x1="78" y1="150" x2="132" y2="170"/>
      <line x1="78" y1="200" x2="132" y2="120"/><line x1="78" y1="200" x2="132" y2="170"/>
    </g>
    <!-- Connections: Hidden 2 to Output -->
    <g stroke="#00E676" stroke-width="0.6" opacity="0.4">
      <line x1="148" y1="70" x2="190" y2="100"/><line x1="148" y1="70" x2="190" y2="160"/>
      <line x1="148" y1="120" x2="190" y2="100"/><line x1="148" y1="120" x2="190" y2="160"/>
      <line x1="148" y1="170" x2="190" y2="100"/><line x1="148" y1="170" x2="190" y2="160"/>
    </g>
    <!-- Labels -->
    <text x="0" y="225" font-family="monospace" font-size="8" fill="#4FC3F7" text-anchor="middle" opacity="0.6">INPUT</text>
    <text x="105" y="235" font-family="monospace" font-size="8" fill="#FF6D00" text-anchor="middle" opacity="0.6">HIDDEN</text>
    <text x="200" y="195" font-family="monospace" font-size="8" fill="#00E676" text-anchor="middle" opacity="0.6">OUTPUT</text>
    <!-- Vs label on output -->
    <text x="200" y="104" font-family="monospace" font-size="6" fill="#00E676" text-anchor="middle">Vs</text>
    <text x="200" y="164" font-family="monospace" font-size="6" fill="#00E676" text-anchor="middle">qu</text>
  </g>

  <!-- === Floating data points / scatter === -->
  <g opacity="0.25">
    <circle cx="170" cy="120" r="2" fill="#4FC3F7"/>
    <circle cx="185" cy="155" r="2.5" fill="#4FC3F7"/>
    <circle cx="160" cy="180" r="2" fill="#FF6D00"/>
    <circle cx="195" cy="200" r="3" fill="#FF6D00"/>
    <circle cx="175" cy="250" r="2" fill="#4FC3F7"/>
    <circle cx="200" cy="280" r="2.5" fill="#FF6D00"/>
    <circle cx="155" cy="300" r="2" fill="#4FC3F7"/>
    <circle cx="1000" cy="100" r="2" fill="#4FC3F7"/>
    <circle cx="980" cy="140" r="2.5" fill="#FF6D00"/>
    <circle cx="1020" cy="180" r="2" fill="#4FC3F7"/>
    <circle cx="990" cy="250" r="3" fill="#FF6D00"/>
    <circle cx="1010" cy="300" r="2" fill="#4FC3F7"/>
    <circle cx="970" cy="320" r="2.5" fill="#FF6D00"/>
  </g>

  <!-- === Python logo (simplified) === -->
  <g transform="translate(920, 290)" opacity="0.35">
    <text font-family="monospace" font-size="11" fill="#4FC3F7">
      <tspan x="0" dy="0">import torch</tspan>
      <tspan x="0" dy="14">import sklearn</tspan>
      <tspan x="0" dy="14">import numpy as np</tspan>
    </text>
  </g>

  <!-- === Code snippets floating === -->
  <g transform="translate(140, 340)" opacity="0.25">
    <text font-family="monospace" font-size="9" fill="#4FC3F7">
      <tspan x="0" dy="0">model.fit(X_train, y_train)</tspan>
      <tspan x="0" dy="13">Vs = predict(N_spt, depth, FC)</tspan>
    </text>
  </g>

  <!-- === CENTER: Main Title === -->
  <!-- Day counter badge -->
  <g transform="translate(640, 90)">
    <rect x="-55" y="-18" width="110" height="28" rx="14" fill="#FF6D00" opacity="0.9"/>
    <text x="0" y="-1" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">100 DAYS</text>
  </g>

  <!-- Main title -->
  <text x="640" y="160" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">
    ML for Geotechnical
  </text>
  <text x="640" y="210" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">
    Engineering
  </text>

  <!-- Orange underline -->
  <rect x="420" y="224" width="440" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Subtitle -->
  <text x="640" y="260" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#90CAF9" text-anchor="middle" letter-spacing="2">
    From Python Basics to AI-Powered Geotechnical Solutions
  </text>

  <!-- Author info -->
  <text x="640" y="300" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#546E7A" text-anchor="middle" letter-spacing="1">
    Ripon Chandra Malo  |  PhD Student  |  University of Utah
  </text>

  <!-- Tech stack pills -->
  <g transform="translate(640, 340)">
    <!-- Python pill -->
    <rect x="-260" y="-12" width="70" height="24" rx="12" fill="#3776AB" opacity="0.7"/>
    <text x="-225" y="4" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" text-anchor="middle">Python</text>
    <!-- PyTorch pill -->
    <rect x="-175" y="-12" width="72" height="24" rx="12" fill="#EE4C2C" opacity="0.7"/>
    <text x="-139" y="4" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" text-anchor="middle">PyTorch</text>
    <!-- Scikit-Learn pill -->
    <rect x="-88" y="-12" width="85" height="24" rx="12" fill="#F7931E" opacity="0.7"/>
    <text x="-45" y="4" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" text-anchor="middle">Scikit-Learn</text>
    <!-- NumPy pill -->
    <rect x="12" y="-12" width="66" height="24" rx="12" fill="#013243" opacity="0.8"/>
    <text x="45" y="4" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" text-anchor="middle">NumPy</text>
    <!-- Pandas pill -->
    <rect x="93" y="-12" width="68" height="24" rx="12" fill="#150458" opacity="0.8"/>
    <text x="127" y="4" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" text-anchor="middle">Pandas</text>
    <!-- Kaggle pill -->
    <rect x="176" y="-12" width="66" height="24" rx="12" fill="#20BEFF" opacity="0.7"/>
    <text x="209" y="4" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="white" text-anchor="middle">Kaggle</text>
  </g>

  <!-- Subtle corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#FF6D00" stroke-width="2" opacity="0.4"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#FF6D00" stroke-width="2" opacity="0.4"/>
  <line x1="1260" y1="380" x2="1220" y2="380" stroke="#FF6D00" stroke-width="2" opacity="0.4"/>
  <line x1="1260" y1="380" x2="1260" y2="340" stroke="#FF6D00" stroke-width="2" opacity="0.4"/>
</svg>
